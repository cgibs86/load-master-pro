<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: -apple-system, Roboto, Arial, sans-serif;
        font-size: 13px;
        color: #202124;
        margin: 0;
        padding: 16px;
      }
      h2 { margin: 0 0 4px; font-size: 16px; }
      p.sub { margin: 0 0 16px; color: #5f6368; }
      label { display: block; font-weight: 600; margin: 12px 0 4px; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        font-size: 13px;
      }
      .hint { color: #5f6368; font-weight: 400; font-size: 11px; margin-top: 2px; }
      .row { display: flex; gap: 10px; }
      .row > div { flex: 1; }
      .actions { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
      button {
        background: #1a73e8; color: #fff; border: none; padding: 9px 18px;
        border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
      }
      button:disabled { background: #9aa0a6; cursor: default; }
      .status { font-size: 12px; }
      .ok { color: #137333; }
      .err { color: #c5221f; }
      .webapp {
        margin-top: 16px; padding: 10px; background: #f1f3f4;
        border-radius: 6px; word-break: break-all; font-size: 11px;
      }
      .webapp.missing { background: #fce8e6; color: #c5221f; }
    </style>
  </head>
  <body>
    <h2>Auto Dialer Settings</h2>
    <p class="sub">Stored privately with this script. Tokens are never shown again.</p>

    <label>Twilio Account SID</label>
    <input id="sid" placeholder="ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />

    <label>Twilio Auth Token <span class="hint" id="tokenHint"></span></label>
    <input id="token" type="password" placeholder="Enter token" />

    <label>From number (your Twilio number)</label>
    <input id="from" placeholder="+15551234567" />

    <div class="row">
      <div>
        <label>Phone column</label>
        <input id="phoneHeader" />
      </div>
      <div>
        <label>Status column</label>
        <input id="statusHeader" />
      </div>
      <div>
        <label>Result column</label>
        <input id="resultHeader" />
      </div>
    </div>

    <label>Max recording seconds</label>
    <input id="recordMax" type="number" min="5" max="120" />
    <div class="hint">How long to record the automated system's response (transcription works best under 120s).</div>

    <div id="webapp" class="webapp"></div>

    <div class="actions">
      <button id="save" onclick="save()">Save settings</button>
      <span id="status" class="status"></span>
    </div>

    <script>
      function setStatus(msg, cls) {
        var el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + (cls || '');
      }

      function render(cfg) {
        document.getElementById('sid').value = cfg.sid || '';
        document.getElementById('from').value = cfg.from || '';
        document.getElementById('phoneHeader').value = cfg.phoneHeader || 'Phone';
        document.getElementById('statusHeader').value = cfg.statusHeader || 'Status';
        document.getElementById('resultHeader').value = cfg.resultHeader || 'Result';
        document.getElementById('recordMax').value = cfg.recordMax || 60;
        document.getElementById('tokenHint').textContent = cfg.tokenSet ? '(saved — leave blank to keep)' : '(required)';

        var w = document.getElementById('webapp');
        if (cfg.webAppUrl) {
          w.className = 'webapp';
          w.innerHTML = '<b>Web App URL (Twilio callbacks):</b><br>' + cfg.webAppUrl;
        } else {
          w.className = 'webapp missing';
          w.innerHTML = '<b>Not deployed yet.</b> Deploy ▸ New deployment ▸ Web app ' +
            '(Execute as: Me, Who has access: Anyone) so Twilio can reach the callbacks.';
        }
      }

      function save() {
        document.getElementById('save').disabled = true;
        setStatus('Saving…');
        var cfg = {
          sid: document.getElementById('sid').value,
          token: document.getElementById('token').value,
          from: document.getElementById('from').value,
          phoneHeader: document.getElementById('phoneHeader').value,
          statusHeader: document.getElementById('statusHeader').value,
          resultHeader: document.getElementById('resultHeader').value,
          recordMax: document.getElementById('recordMax').value
        };
        google.script.run
          .withSuccessHandler(function (fresh) {
            render(fresh);
            document.getElementById('token').value = '';
            document.getElementById('save').disabled = false;
            setStatus('Saved ✓', 'ok');
          })
          .withFailureHandler(function (err) {
            document.getElementById('save').disabled = false;
            setStatus(err.message || 'Failed to save', 'err');
          })
          .saveSettings(cfg);
      }

      google.script.run.withSuccessHandler(render).getSettings();
    </script>
  </body>
</html>
